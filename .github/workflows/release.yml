name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v25.7.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    # Per-target failures are tolerated (continue-on-error) so the release + tap
    # ship from whichever targets built; the formula's emit() skips missing ones.
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # Intel macOS runners (macos-13) are scarce/deprecated and queue
          # indefinitely, so cross-compile x86_64 on the arm runner. clang's
          # universal SDK + cc -arch x86_64 handles the grammars. allow_failure
          # keeps a cross hiccup from blocking the whole release.
          - os: macos-latest
            target: x86_64-apple-darwin
            allow_failure: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # The rust-toolchain action ignores rust-toolchain.toml; remove it so the
      # toolchain used to build matches the one the action installs.
      - name: Remove rust-toolchain.toml
        run: rm -f rust-toolchain.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # Two binaries per target: the full default build (all embedded scripting
      # languages) and a "minimal" build with the `scripting` feature off, which
      # drops every interpreter crate (elisprs/vimlrs/awkrs/zshrs/strykelang) for
      # a smaller binary. Each cargo build writes the same target/.../zemacs path,
      # so stash each before the next.
      #
      # build.rs fetches + compiles the tree-sitter grammars for ${target} into
      # runtime/grammars during the build (Cargo.lock is gitignored, no --locked).
      - name: Build zemacs (full)
        run: |
          cargo build --locked --release --bin zemacs --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/zemacs" zemacs-full

      - name: Build zemacs (minimal — no embedded scripting)
        run: |
          cargo build --locked --release --bin zemacs \
            --no-default-features --features git --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/zemacs" zemacs-minimal

      - name: Package (binaries + runtime)
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -eu
          target="${{ matrix.target }}"
          # Bundle the runtime tree (target-compiled grammars + queries/themes/
          # tutor) once and share it between both variants. Drop grammar sources
          # — only the compiled libs are needed.
          rm -rf runtime/grammars/sources
          package() {
            local suffix="$1" binary="$2"
            local pkg="zemacs-${TAG}-${target}${suffix}"
            mkdir -p "$pkg"
            cp "$binary" "$pkg/zemacs"
            strip "$pkg/zemacs" 2>/dev/null || true
            cp -r runtime "$pkg/runtime"
            cp LICENSE README.md ATTRIBUTION.md "$pkg/" 2>/dev/null || true
            tar czf "${pkg}.tar.gz" "$pkg"
          }
          # Full keeps the canonical name (Homebrew + install.sh consume it);
          # minimal gets a `-minimal` suffix.
          package ""         zemacs-full
          package "-minimal" zemacs-minimal

      - uses: actions/upload-artifact@v7
        with:
          name: zemacs-${{ matrix.target }}
          path: zemacs-${{ inputs.tag || github.ref_name }}-${{ matrix.target }}*.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            # zemacs-vX.Y.Z-<target>.tar.gz -> <target with _ for ->
            key=$(echo "$base" | sed 's/zemacs-v[^-]*-//; s/\.tar\.gz//; s/-/_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v6
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update zemacs formula
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          SHA_ARM_MACOS: ${{ steps.sha.outputs.aarch64_apple_darwin }}
          SHA_X86_MACOS: ${{ steps.sha.outputs.x86_64_apple_darwin }}
          SHA_X86_LINUX: ${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}
          SHA_ARM_LINUX: ${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}
        run: |
          set -eu
          V="${VERSION#v}"
          BASE="https://github.com/MenkeTechnologies/zemacs/releases/download/v${V}"
          # Emit an on_arm / on_intel block only when its SHA is non-empty
          # (so the formula stays valid even if a target failed to build).
          emit() {
            local guard="$1" arch="$2" sha="$3"
            [ -n "$sha" ] || return 0
            printf '    %s do\n      url "%s/zemacs-v%s-%s.tar.gz"\n      sha256 "%s"\n    end\n' \
              "$guard" "$BASE" "$V" "$arch" "$sha"
          }
          mac_blocks=$( { emit on_arm aarch64-apple-darwin "$SHA_ARM_MACOS"; emit on_intel x86_64-apple-darwin "$SHA_X86_MACOS"; } )
          linux_blocks=$( { emit on_intel x86_64-unknown-linux-gnu "$SHA_X86_LINUX"; emit on_arm aarch64-unknown-linux-gnu "$SHA_ARM_LINUX"; } )
          {
            printf 'class Zemacs < Formula\n'
            printf '  desc "Modal text editor in Rust — vim/emacs keymaps"\n'
            printf '  homepage "https://github.com/MenkeTechnologies/zemacs"\n'
            printf '  license "MPL-2.0"\n'
            printf '  version "%s"\n\n' "$V"
            [ -n "$mac_blocks" ]   && printf '  on_macos do\n%s\n  end\n\n' "$mac_blocks"
            [ -n "$linux_blocks" ] && printf '  on_linux do\n%s\n  end\n\n' "$linux_blocks"
            # Install the binary + runtime under libexec; symlink the binary
            # into bin. zemacs finds runtime/ as a sibling of the real binary.
            printf '  def install\n'
            printf '    libexec.install Dir["*"]\n'
            printf '    bin.install_symlink libexec/"zemacs"\n'
            printf '  end\n\n'
            printf '  test do\n'
            printf '    assert_match "zemacs", shell_output("#{bin}/zemacs --version")\n'
            printf '  end\n'
            printf 'end\n'
          } > tap/Formula/zemacs.rb

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zemacs.rb
          if git diff --cached --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "zemacs: bump to ${{ github.ref_name }}"
          git push
