name: Build
on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  schedule:
    - cron: "00 01 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  MSRV: "1.90"
  # This key can be changed to bust the cache of tree-sitter grammars.
  GRAMMAR_CACHE_VERSION: ""

jobs:
  check:
    name: Check (msrv)
    runs-on: ubuntu-latest
    if: github.repository == 'MenkeTechnologies/zemacs' || github.event_name != 'schedule'
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.MSRV }}
          cache-key: build

      - name: Run cargo check
        run: cargo check

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    if: github.repository == 'MenkeTechnologies/zemacs' || github.event_name != 'schedule'
    # The ubuntu-24.04-arm runner is ~2.5x slower than macOS/ubuntu-latest and
    # spends most of its wall-clock compiling this large workspace for the test
    # profile (macOS ~22m, ubuntu ~15m, arm >50m even with a warm cache); give the
    # matrix enough headroom that the slow arm leg isn't a chronic timeout.
    timeout-minutes: 90
    env:
      RUST_BACKTRACE: 1
      ZEMACS_LOG_LEVEL: info
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.MSRV }}
          cache-key: build
          cache-grammars: 'true'
          grammar-cache-version: ${{ env.GRAMMAR_CACHE_VERSION }}

      - name: Run cargo test
        run: cargo test --workspace

      - name: Run cargo integration-test
        run: cargo integration-test

    strategy:
      # The embedded CLI stack (vendored zshrs / strykelang) is unix-only — it
      # uses libc mmap/mprotect directly and does not target Windows (macOS +
      # Linux + Linux-arm, per zshrs's platform list). Windows runners are
      # excluded because those crates cannot compile there.
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]

  lints:
    name: Lints
    runs-on: ubuntu-latest
    if: github.repository == 'MenkeTechnologies/zemacs' || github.event_name != 'schedule'
    # fmt/clippy/doc only type-check; the tree-sitter grammars are loaded at
    # runtime (dlopen of prebuilt .so), so this job never needs them compiled.
    # It also does not cache grammars, so leaving the auto-build on makes every
    # run do a cold fetch of all 300+ grammars from third-party git hosts — one
    # flaky host (a git.sr.ht outage) then fails the whole Lints job in build.rs.
    # Grammar validation lives in the cached "Grammar Lint" job, not here.
    env:
      ZEMACS_DISABLE_AUTO_GRAMMAR_BUILD: "1"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.MSRV }}
          components: rustfmt, clippy
          cache-key: build

      - name: Run cargo fmt
        # Pin an exact rustfmt version: its output drifts between releases, so
        # checking with a different rustfmt than the code was formatted with is a
        # false negative (neither the MSRV pin nor a floating `stable` is stable
        # over time). Bump this in lockstep when reformatting the tree. Also:
        # `cargo fmt --all` descends into local path dependencies, which would
        # try to format the vendored scripting submodules under vendor/; format
        # only this workspace's members (derived so it tracks the member list).
        env:
          FMT_TOOLCHAIN: "1.96.0"
        run: |
          rustup toolchain install "$FMT_TOOLCHAIN" --component rustfmt --profile minimal
          members=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import sys,json;print(' '.join('-p '+p['name'] for p in json.load(sys.stdin)['packages']))")
          cargo "+$FMT_TOOLCHAIN" fmt $members --check

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run cargo doc
        run: cargo doc --no-deps --workspace --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  docs:
    name: Grammar Lint
    runs-on: ubuntu-latest
    if: github.repository == 'MenkeTechnologies/zemacs' || github.event_name != 'schedule'
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.MSRV }}
          cache-key: build
          cache-grammars: 'true'
          grammar-cache-version: ${{ env.GRAMMAR_CACHE_VERSION }}

      - name: Validate queries
        if: always()
        run: cargo xtask query-check

      - name: Validate indents
        if: always()
        run: cargo xtask indent-check

      - name: Validate highlights
        if: always()
        run: cargo xtask highlight-check

      - name: Validate themes
        if: always()
        run: cargo xtask theme-check

      - name: Generate docs
        if: always()
        run: cargo xtask docgen

      - name: Check uncommitted documentation changes
        if: always()
        run: |
          git diff
          git diff-files --quiet \
            || (echo "Run 'cargo xtask docgen', commit the changes and push again" \
            && exit 1)

  port-report:
    name: Port Report
    runs-on: ubuntu-latest
    if: github.repository == 'MenkeTechnologies/zemacs' || github.event_name != 'schedule'
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Regenerate port report
        run: python3 scripts/gen_port_report.py | tee /tmp/port_report.out

      - name: Fail on broken mappings
        run: |
          grep -q 'broken=0' /tmp/port_report.out \
            || (echo "Port report has broken mappings — a mapping points at zemacs code that does not exist. Fix port/mapping.json." \
            && exit 1)

      - name: Check uncommitted port-report changes
        run: |
          git diff
          git diff-files --quiet \
            || (echo "Run 'python3 scripts/gen_port_report.py', commit the changes and push again" \
            && exit 1)
