# we use tokio_unstable to enable runtime::Handle::id so we can separate
# globals from multiple parallel tests. If that function ever does get removed
# its possible to replace (with some additional overhead and effort)
# Annoyingly build.rustflags doesn't work here because it gets overwritten
# if people have their own global target.<..> config (for example to enable mold)
# specifying flags this way is more robust as they get merged
# This still gets overwritten by RUST_FLAGS though, luckily it shouldn't be necessary
# to set those most of the time. If downstream does overwrite this its not a huge
# deal since it will only break tests anyway
[target."cfg(all())"]
rustflags = ["--cfg", "tokio_unstable", "-C", "target-feature=-crt-static"]

# The `scripting` feature embeds five fusevm interpreters (zsh, elisp, viml, awk,
# stryke). Each unconditionally `#[no_mangle]`-exports `fusevm_aot_register_builtins`
# — the startup hook fusevm calls in a *standalone* single-interpreter AOT binary
# (`zbuild --native`). That symbol is never called in the embedded host, but
# linking all five interpreters into one binary places five identical definitions
# in the link. macOS `ld` tolerates the duplicates; Linux `rust-lld` is strict and
# errors. Allow the (intentional, uncalled) duplicates on Linux so the default
# build links. The architecturally-clean fix is to gate each export behind a
# feature only the standalone AOT build enables — that lives in the interpreter
# submodules and is tracked there; this keeps the host build green meanwhile.
[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-Wl,--allow-multiple-definition"]


# Bake the in-repo runtime/ directory (grammars, queries, themes, tutor) in as
# the build-time fallback runtime path, so a directly-launched `zemacs` binary
# finds syntax highlighting/queries without a wrapper, env var, or symlink.
# `relative = true` resolves against the workspace root, so this stays portable
# across checkouts. It is a fallback (priority below the user config dir), so it
# never overrides a real user runtime.
[env]
ZEMACS_DEFAULT_RUNTIME = { value = "runtime", relative = true }

[alias]
xtask = "run --package xtask --"
integration-test = "test --features integration --profile integration --workspace --test integration"

